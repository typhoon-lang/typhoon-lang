name: Test

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Clang
        if: runner.os != 'macOS'
        uses: egor-tensin/setup-clang@v2
        with:
          version: latest
          platform: x64

      - name: Install Rust
        uses: moonrepo/setup-rust@v1

      - name: Run tests
        run: cargo test --verbose

      - name: Run sample tests
        run: |
          cargo run --verbose -- sample/main.ty main
          chmod +x ./main
          ./main || status=$?
          echo "Command exited with $status"
